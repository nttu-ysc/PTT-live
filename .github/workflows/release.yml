name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install mingw-w64
        run: brew install mingw-w64

      - name: Build macOS Universal DMG
        run: make dmg

      - name: Build Windows exe
        run: make windows

      - name: Package release artifacts
        run: |
          mkdir -p build/release
          tar -czvf "build/release/PTT-Live-mac-universal.tar.gz" \
            -C "build/bin/PTT Live.app/Contents/MacOS" "PTT Live"
          (cd "build/bin" && zip "../release/PTT-Live-windows-amd64.zip" "PTT Live.exe")
          cp "build/dmg/PTT Live.dmg"  "build/release/PTT.Live.dmg"
          cp "build/bin/PTT Live.exe"  "build/release/PTT.Live.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/release/PTT.Live.dmg
            build/release/PTT.Live.exe
            build/release/PTT-Live-mac-universal.tar.gz
            build/release/PTT-Live-windows-amd64.zip
