<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PTT Live</title>
</head>

<body>

            </svg>
        </div>
    </div>
    <!-- Global opacity slider — hidden on login page, shown after login -->
    <div class="opacity-bar" id="opacity-bar" style="--wails-draggable: no-drag; display: none;">
        <input type="range" id="opacity-slider" min="0" max="100" value="100" step="1"
            style="--wails-draggable: no-drag;">
    </div>
    <login-page></login-page>
    <board-page style="display: none;"></board-page>
    <post-list-page style="display: none;">
        <div class="toolbar">
            <button class="toolbar-btn" id="list-back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                返回
            </button>
            <span class="toolbar-title" id="board-name-label"></span>
            <button class="toolbar-btn" id="list-refresh-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                重新整理
            </button>
        </div>
        <div id="post-list"></div>
    </post-list-page>
    <post-detail-page style="display: none;">
        <div class="toolbar">
            <button class="toolbar-btn" id="detail-back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                返回
            </button>
            <span class="toolbar-title" id="post-title-label">Live 聊天室</span>
            <!-- Spacer to balance the toolbar and keep title centered -->
            <span class="toolbar-spacer"></span>
        </div>
        <!-- Fixed delay slider pill on the left side to avoid overlapping with right-side opacity slider -->
        <div class="delay-bar" id="delay-bar" style="--wails-draggable: no-drag;">
            <label for="delay-slider" style="margin:0; font-size:12px; color:rgba(255,255,255,0.85); font-weight:600;">防雷延遲</label>
            <input type="range" id="delay-slider" min="0" max="60" value="0" step="1" style="--wails-draggable: no-drag;">
        </div>
        <div id="msg-container">
            <div id="chat-container">
                <!-- Overlay for showing delay seconds -->
                <div id="delay-overlay" class="delay-overlay" style="display: none;"></div>
                <div id="chat-loading"></div>
                <div id="chat-messages">
                </div>
                <div id="newMessageAlert" onclick="scrollToBottom()"></div>
            </div>
            <div>
                <form id="chat-form" class="input-container">
                    <input id="chat-input" type="text" placeholder="Type a message...">
                    <button id="send-chat-btn" class="btn" type="submit">Send</button>
                </form>
            </div>
            <div class="mode-selector" id="modeSelector">
                <button data-mode="1">推</button>
                <button data-mode="2">噓</button>
                <button data-mode="3">-></button>
            </div>
        </div>
    </post-detail-page>
    <main-page style="display: none;"></main-page>

    <!-- About Modal Overlay -->
    <div id="about-overlay" class="about-overlay"></div>

    <!-- About Modal -->
    <div id="about-modal" class="about-modal">
        <button id="about-close-btn" class="about-close-btn">✕</button>
        <div class="about-logo-wrap">
            <img src="src/assets/images/ptt.png" alt="PTT Live" class="about-logo">
        </div>
        <h2 class="about-title">PTT Live</h2>
        <p class="about-version" id="about-version">v2.0.0</p>
        <p class="about-desc">PTT 即時聊天室 App<br>基於 Wails + Go 開發</p>
        <div class="about-links">
            <a href="#" id="about-github-link" class="about-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                GitHub
            </a>
            <a href="#" id="about-releases-link" class="about-link">
                🚀 下載 / Releases
            </a>
        </div>
        <p class="about-author">作者：Shun</p>
    </div>

    <!-- Update Toast -->
    <div id="update-toast" class="update-toast">
        <span id="update-toast-msg"></span>
        <div class="update-toast-actions">
            <button id="update-toast-action" class="update-toast-action-btn">前往下載</button>
            <button id="update-toast-close" class="update-toast-close-btn">✕</button>
        </div>
    </div>

    <script src="./src/main.js" type="module"></script>
    <script>
        function scrollToBottom() {
            const chatMessages = document.getElementById('chat-messages');
            const newMessageAlert = document.getElementById('newMessageAlert');
            chatMessages.scrollTop = chatMessages.scrollHeight;
            newMessageAlert.style.display = 'none';
        }
    </script>
</body>

</html>
